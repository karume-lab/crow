services:
  - type: web
    name: crow-backend
    env: node
    plan: free
    # Tell Render to only look inside the apps/backend folder
    rootDir: apps/backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: DB_PATH
        value: ./data/crow.db
      - key: BASE_URL
        # This will automatically inject the public URL Render gives you
        # So you don't even need to configure it manually!
        value: https://${RENDER_EXTERNAL_HOSTNAME}
